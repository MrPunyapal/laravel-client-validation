name: build-docs

on:
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - 'composer.json'
      - 'docs/assets/**'
      - 'docs/build.php'
      - 'docs/template.php'
      - '.github/workflows/build-docs.yml'

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_EDIT_BRANCH: main
      DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, fileinfo, intl, mbstring
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Build docs site
        run: php docs/build.php

      - name: Detect generated docs changes
        id: docs_changes
        run: |
          if [ -n "$(git status --porcelain docs/generated)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/generated

      - name: Commit regenerated docs
        if: steps.docs_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/generated
          git commit -m "docs: rebuild generated site"
          git push
